<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Reservation Sport</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 120px repeat(5, 1fr); gap: 2px; max-width: 1000px; margin: auto; }
        
        /* Header & Navigation */
        .date-control { text-align: center; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; position: relative; }
        .global-loader { position: absolute; right: 0; width: 30px; height: 30px; border: 4px solid #444; border-top: 4px solid #27ae60; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .nav-group { display: flex; gap: 5px; width: 90px; }
        #datePicker { padding: 10px; background: #333; color: white; border: 1px solid #444; height: 40px; box-sizing: border-box; cursor: pointer; }
        .nav-btn { height: 40px; width: 40px; background: #333; border: 1px solid #444; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        
        /* Boxen & Design */
        .box { border: 1px solid #444; padding: 5px; background: #262626; min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 11px; position: relative; cursor: pointer; overflow: hidden; }
        .box.empty { pointer-events: none; opacity: 0.5; }
        
        /* Ausfall-Modus mit Strichmuster */
        .box.ausfall-mode { background-color: #000000 !important; color: #777777 !important; background-image: linear-gradient(to top right, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)), linear-gradient(to top left, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)); }
        .box.ausfall-mode .klasse { color: #777777; }
        .box.ausfall-mode .res { color: #555555; }

        /* Sprechblasen-Icon (Stift/Kommentar) */
        .stift { 
            position: absolute; top: 2px; right: 4px; z-index: 50; 
            color: #e67e22; cursor: pointer; pointer-events: auto; 
            display: inline-block; font-size: 22px; line-height: 1; 
            text-shadow: 0 0 5px rgba(0,0,0,1); transition: transform 0.2s ease;
        }
        .stift:hover { transform: scale(1.2); color: #ff9f43; }

        .zeit-box { background: #333; font-weight: bold; cursor: default; }
        .header-row { grid-column: span 6; background: #333; font-size: 14px; font-weight: bold; position: relative; display: flex; align-items: center; justify-content: center; height: 50px; }
        
        /* Sperranzeige Box */
        .sperr-box { grid-column: span 6; padding: 60px; text-align: center; background: #1a1a1a; border: 2px dashed #e74c3c; color: #e74c3c; font-size: 26px; font-weight: bold; border-radius: 10px; margin-top: 20px; }
        
        /* Login Overlay */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #loginOverlay input { padding: 10px; margin: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; text-align: center; }
        #loginOverlay button { padding: 10px 20px; background: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .klasse { font-weight: bold; }
        .res { font-style: italic; font-size: 9px; margin-top: 2px; position: relative; z-index: 10; }
        
        /* Unsichtbare Selects */
        select { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer; z-index: 5; }
        .extra-select { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; z-index: -1; pointer-events: none; }
        
        /* Speichern & Loader */
        .save-container { position: absolute; right: 10px; z-index: 10; display: flex; align-items: center; height: 40px; }
        .save-btn { padding: 8px 20px; background: #e67e22; color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; display: none; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .save-btn.success { background: #27ae60; } 
        .sport-loader { font-size: 24px; visibility: hidden; animation: bounce 0.6s infinite alternate; }
        .sport-loader.active { visibility: visible; }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
        
        /* Trennlinien */
        .divider-thin { grid-column: 1 / span 6; height: 1px; background: #444; margin: 2px 0; }
        .divider-thick { grid-column: 1 / span 6; height: 4px; background: #444; margin: 5px 0; }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <h2 style="color: #e67e22">🏀 Reservation Sport</h2>
        <input type="password" id="pwInput" placeholder="Passwort eingeben" oninput="document.getElementById('loginError').innerText=''">
        <button onclick="checkLogin()">Anmelden</button>
        <div id="loginBall" class="sport-loader">🏀</div>
        <p id="loginError" style="color: #e74c3c; margin-top: 10px;"></p>
    </div>

    <div class="date-control">
        <div class="nav-group">
            <button id="btnPrevWeek" class="nav-btn" onclick="changeDate(-7)">⏮</button>
            <button id="btnPrevDay" class="nav-btn" onclick="changeDate(-1)">◀</button>
        </div>
        <input type="date" id="datePicker" onchange="loadPlan()">
        <div class="nav-group">
            <button class="nav-btn" onclick="changeDate(1)">▶</button>
            <button class="nav-btn" onclick="changeDate(7)">⏭</button>
        </div>
        <div id="globalLoader" class="global-loader"></div>
    </div>
    <div class="grid" id="plan"></div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbwpLVFHfNEIhn1So8plnEREM_ok4ST-Cd1ehG7A7QI99OuVrUGDqKsQMLOjFP-No9kSHQ/exec"; 
        let pendingChanges = [], configFarben = {}, userPw = "", pressTimer;
        let currentPlanData = [], lastStableDate = "";

        // Warnung beim Verlassen
        window.addEventListener('beforeunload', (e) => {
            if (pendingChanges.length > 0) { e.preventDefault(); e.returnValue = ''; }
        });

        function updateNavButtons() {
            const dp = document.getElementById('datePicker');
            const currentDate = new Date(dp.value); currentDate.setHours(12,0,0,0);
            const heute = new Date(); heute.setHours(12,0,0,0);
            document.getElementById('btnPrevDay').style.visibility = (new Date(currentDate).setDate(currentDate.getDate()-1) < heute) ? 'hidden' : 'visible';
            document.getElementById('btnPrevWeek').style.visibility = (new Date(currentDate).setDate(currentDate.getDate()-7) < heute) ? 'hidden' : 'visible';
        }

        function closeAllExtraMenus() {
            document.querySelectorAll('.extra-select').forEach(sel => {
                sel.style.zIndex = "-1"; sel.style.pointerEvents = "none"; sel.style.opacity = "0"; sel.blur();
            });
        }

        async function checkLogin() {
            const ball = document.getElementById('loginBall'), pw = document.getElementById('pwInput').value;
            ball.classList.add('active');
            try {
                const res = await fetch(`${url}?mode=login&pw=${pw}`);
                const json = await res.json();
                if (json.error) {
                    document.getElementById('loginError').innerText = "Falsches Passwort!";
                    ball.classList.remove('active');
                } else {
                    userPw = pw;
                    document.getElementById('loginOverlay').style.display = 'none';
                    loadPlan();
                }
            } catch(e) { ball.classList.remove('active'); }
        }

        async function loadPlan() {
            const dp = document.getElementById('datePicker');
            // Logik-Schutz: Falls ungespeichert, zurücksetzen bei Abbruch
            if (pendingChanges.length > 0) {
                if (!confirm("Änderungen wurden noch nicht gespeichert. Trotzdem fortfahren?")) {
                    dp.value = lastStableDate;
                    return;
                }
            }
            
            const dateVal = dp.value;
            if (!userPw || !dateVal) return;
            lastStableDate = dateVal;
            updateNavButtons();
            
            const container = document.getElementById('plan');
            container.innerHTML = ""; // Plan leeren für Loader-Feedback
            document.getElementById('globalLoader').style.display = 'block';

            try {
                const res = await fetch(`${url}?date=${dateVal}&pw=${userPw}`);
                const json = await res.json();
                container.innerHTML = ""; pendingChanges = [];
                
                // 1. Sperr-Check
                if (json.sperre) {
                    container.innerHTML = `<div class="sperr-box"><i class="fas fa-calendar-times"></i><br><br>${json.sperre}</div>`;
                } else {
                    currentPlanData = json.data;
                    const options = json.options;
                    options.forEach(opt => configFarben[opt[0]] = opt[1]);
                    
                    const [y, m, d] = dateVal.split('-').map(Number);
                    const wtArr = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
                    const dateObj = new Date(dateVal);

                    json.data.forEach((row, rowIndex) => {
                        if (rowIndex === 0) {
                            container.innerHTML += `<div class="box header-row">
                                <span>${wtArr[dateObj.getDay()]}, ${d}.${m}.${y}</span>
                                <div class="save-container">
                                    <div id="sport-loader" class="sport-loader">🏀</div>
                                    <button id="saveBtn" class="save-btn" onclick="saveChanges()">SPEICHERN</button>
                                </div>
                            </div>`;
                        } else {
                            if (rowIndex === 4 || rowIndex === 10) container.innerHTML += `<div class="divider-thin"></div>`;
                            if (rowIndex === 7) container.innerHTML += `<div class="divider-thick"></div>`;
                            
                            container.innerHTML += `<div class="box zeit-box">${row[0]}</div>`;
                            for(let i = 1; i <= 5; i++) {
                                let val = row[i] || "", teile = val.split(' | '), klasse = teile[0], res = teile[1] || "", kommentar = teile[2] || "";
                                let isAusfall = (res === "Ausfall");
                                let stiftHtml = (kommentar.startsWith("KOMMENTAR:")) ? `<span class="stift" onclick="event.stopPropagation(); alert('Notiz: ${kommentar.replace('KOMMENTAR:', '')}')"><i class="fas fa-comment-dots"></i></span>` : "";
                                
                                container.innerHTML += `
                                <div class="box ${klasse.trim()===''?'empty':''} ${isAusfall?'ausfall-mode':''}" 
                                     data-row="${rowIndex}" data-col="${i}" 
                                     oncontextmenu="handleContextMenu(event, this)" 
                                     ontouchstart="startTimer(this)" ontouchend="clearTimer()" 
                                     style="background-color: ${isAusfall?'':configFarben[res]||''}">
                                    ${stiftHtml}
                                    <div class="klasse">${klasse}</div>
                                    <div class="res">${res}</div>
                                    <select onchange="addChange(this, '${row[0]}', ${i}, '${klasse}'); closeAllExtraMenus();">
                                        <option value="">---</option>
                                        ${options.map(o => `<option value="${o[0]}" ${res===o[0]?'selected':''}>${o[0]}</option>`).join('')}
                                    </select>
                                    <select class="extra-select" onchange="handleExtraAction(this, '${row[0]}', ${i})">
                                        <option value="">---</option>
                                        <option value="ausfall">Ausfall</option>
                                        <option value="kommentar">Kommentar</option>
                                    </select>
                                </div>`;
                            }
                        }
                    });
                }
            } catch(e) { console.error(e); }
            document.getElementById('globalLoader').style.display = 'none';
        }

        function getExistingComment(r, c) {
            let val = (currentPlanData[r] && currentPlanData[r][c]) ? currentPlanData[r][c] : "";
            let teile = val.split(' | ');
            return (teile[2] && teile[2].startsWith("KOMMENTAR:")) ? teile[2] : "";
        }

        window.addChange = (el, time, slot, klasse) => {
            let res = el.value; const parent = el.parentElement;
            const r = parent.dataset.row, c = parent.dataset.col;
            parent.classList.remove('ausfall-mode');
            parent.querySelector('.res').innerText = (res === "" || res === "---") ? "" : res;
            parent.style.backgroundColor = configFarben[res] || "";
            
            let comment = getExistingComment(r, c);
            let finalVal = (res === "" || res === "---") ? klasse : klasse + " | " + res;
            if (comment) finalVal += " | " + comment;
            
            pendingChanges.push({ time, slotIndex: slot, val: finalVal });
            document.getElementById('saveBtn').style.display = 'block';
        };

        window.handleExtraAction = (el, time, slot) => {
            const action = el.value, parent = el.parentElement, klasse = parent.querySelector('.klasse').innerText;
            const r = parent.dataset.row, c = parent.dataset.col;
            let pureRes = parent.querySelector('.res').innerText.trim();
            
            if (action === "ausfall") {
                parent.classList.add('ausfall-mode'); parent.style.backgroundColor = "";
                parent.querySelector('.res').innerText = "Ausfall";
                let comment = getExistingComment(r, c);
                pendingChanges.push({ time, slotIndex: slot, val: klasse + " | Ausfall" + (comment ? " | " + comment : "") });
            } else if (action === "kommentar") {
                const text = prompt("Kommentar für " + klasse + " eingeben:");
                if(text) {
                    const s = parent.querySelector('.stift'); if (s) s.remove();
                    parent.innerHTML += `<span class="stift" onclick="event.stopPropagation(); alert('Notiz: ${text}')"><i class="fas fa-comment-dots"></i></span>`;
                    pendingChanges.push({ time, slotIndex: slot, val: klasse + " | " + pureRes + " | KOMMENTAR:" + text });
                }
            }
            document.getElementById('saveBtn').style.display = 'block';
            closeAllExtraMenus(); el.value = "";
        };

        window.saveChanges = async () => {
            const btn = document.getElementById('saveBtn'), ball = document.getElementById('sport-loader');
            btn.style.display = 'none'; ball.classList.add('active');
            try {
                await fetch(url, { method: "POST", body: JSON.stringify({ date: document.getElementById('datePicker').value, changes: pendingChanges, pw: userPw }) });
                pendingChanges = []; ball.classList.remove('active');
                btn.innerText = "Gespeichert!"; btn.classList.add('success'); btn.style.display = 'block';
                setTimeout(() => { 
                    btn.style.display = 'none'; btn.classList.remove('success'); btn.innerText = "SPEICHERN"; 
                    loadPlan(); 
                }, 1000);
            } catch(e) { ball.classList.remove('active'); btn.style.display = 'block'; btn.innerText = "Fehler!"; }
        };

        window.changeDate = (days) => { 
            const dp = document.getElementById('datePicker'); 
            let d = new Date(dp.value); d.setDate(d.getDate() + days); 
            dp.valueAsDate = d; loadPlan(); 
        };

        window.startTimer = (el) => { pressTimer = setTimeout(() => openExtraMenu(el), 500); };
        window.clearTimer = () => clearTimeout(pressTimer);
        window.handleContextMenu = (e, el) => { e.preventDefault(); openExtraMenu(el); };
        
        function openExtraMenu(el) {
            closeAllExtraMenus();
            const sel = el.querySelector('.extra-select');
            sel.style.zIndex = "100"; sel.style.opacity = "1"; sel.style.pointerEvents = "all";
            setTimeout(() => { if (sel.showPicker) sel.showPicker(); else sel.click(); }, 50);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date(); today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
            const dateStr = today.toISOString().split('T')[0];
            document.getElementById('datePicker').value = dateStr;
            lastStableDate = dateStr;
        });
    </script>
</body>

                            container.innerHTML += `<div class="box zeit-box">${row[0]}</div>`;
                            for(let i = 1; i <= 5; i++) {
                                let val = row[i] || "", teile = val.split(' | '), klasse = teile[0], res = teile[1] || "", kommentar = teile[2] || "";
                                let stiftHtml = (kommentar.startsWith("KOMMENTAR:")) ? `<span class="stift" onclick="event.stopPropagation(); alert('Notiz: ${kommentar.replace('KOMMENTAR:', '')}')"><i class="fas fa-comment-dots"></i></span>` : "";
                                container.innerHTML += `<div class="box ${klasse.trim()===''?'empty':''} ${res==='Ausfall'?'ausfall-mode':''}" data-row="${rowIndex}" data-col="${i}" oncontextmenu="handleContextMenu(event, this)" ontouchstart="startTimer(this)" ontouchend="clearTimer()" style="background-color: ${res==='Ausfall'?'':configFarben[res]||''}">
                                    ${stiftHtml}<div class="klasse">${klasse}</div><div class="res">${res}</div>
                                    <select onchange="addChange(this, '${row[0]}', ${i}, '${klasse}')"><option value="">---</option>${options.map(o => `<option value="${o[0]}" ${res===o[0]?'selected':''}>${o[0]}</option>`).join('')}</select>
                                    <select class="extra-select" onchange="handleExtraAction(this, '${row[0]}', ${i})"><option value="">---</option><option value="ausfall">Ausfall</option><option value="kommentar">Kommentar</option></select>
                                </div>`;
                            }
                        }
                    });
                }
            } catch(e) { console.error(e); }
            document.getElementById('globalLoader').style.display = 'none';
        }

        function getExistingComment(r, c) {
            let val = (currentPlanData[r] && currentPlanData[r][c]) ? currentPlanData[r][c] : "";
            let teile = val.split(' | ');
            return (teile[2] && teile[2].startsWith("KOMMENTAR:")) ? teile[2] : "";
        }

        window.addChange = (el, time, slot, klasse) => {
            let res = el.value; const parent = el.parentElement;
            parent.querySelector('.res').innerText = res; parent.style.backgroundColor = configFarben[res] || "";
            let finalVal = klasse + (res ? " | " + res : "") + (getExistingComment(parent.dataset.row, parent.dataset.col) ? " | " + getExistingComment(parent.dataset.row, parent.dataset.col) : "");
            pendingChanges.push({ time, slotIndex: slot, val: finalVal });
            document.getElementById('saveBtn').style.display = 'block';
        };

        window.handleExtraAction = (el, time, slot) => {
            const action = el.value, parent = el.parentElement, klasse = parent.querySelector('.klasse').innerText;
            if (action === "ausfall") {
                parent.classList.add('ausfall-mode'); parent.querySelector('.res').innerText = "Ausfall";
                pendingChanges.push({ time, slotIndex: slot, val: klasse + " | Ausfall" + (getExistingComment(parent.dataset.row, parent.dataset.col)?" | "+getExistingComment(parent.dataset.row, parent.dataset.col):"") });
            } else if (action === "kommentar") {
                const text = prompt("Kommentar:");
                if(text) pendingChanges.push({ time, slotIndex: slot, val: klasse + " | " + parent.querySelector('.res').innerText + " | KOMMENTAR:" + text });
            }
            document.getElementById('saveBtn').style.display = 'block'; el.value = "";
        };

        window.saveChanges = async () => {
            const btn = document.getElementById('saveBtn'), ball = document.getElementById('sport-loader');
            btn.style.display = 'none'; ball.classList.add('active');
            await fetch(url, { method: "POST", body: JSON.stringify({ date: document.getElementById('datePicker').value, changes: pendingChanges, pw: userPw }) });
            pendingChanges = []; ball.classList.remove('active'); btn.innerText = "Gespeichert!"; btn.classList.add('success'); btn.style.display = 'block';
            setTimeout(() => { btn.style.display = 'none'; btn.classList.remove('success'); btn.innerText = "SPEICHERN"; loadPlan(); }, 1000);
        };

        window.changeDate = (days) => { const dp = document.getElementById('datePicker'); let d = new Date(dp.value); d.setDate(d.getDate() + days); dp.valueAsDate = d; loadPlan(); };
        window.startTimer = (el) => { pressTimer = setTimeout(() => openExtraMenu(el), 500); };
        window.clearTimer = () => clearTimeout(pressTimer);
        window.handleContextMenu = (e, el) => { e.preventDefault(); openExtraMenu(el); };
        function openExtraMenu(el) { const sel = el.querySelector('.extra-select'); sel.style.zIndex = "100"; sel.style.opacity = "1"; sel.style.pointerEvents = "all"; }

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date(); today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
            const dateStr = today.toISOString().split('T')[0];
            document.getElementById('datePicker').value = dateStr;
            lastStableDate = dateStr;
        });
    </script>
</body>
</html>
